<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 · 在线双人对战</title>
    <!-- 引入 Apinator 客户端（实际链接需要根据 Apinator 文档替换） -->
    <!-- 注意：以下链接是示例，Apinator 的实际 SDK 链接需要您去官网复制 -->
    <script src="https://cdn.apinator.com/sdk/v1/apinator.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #2b5a4c 0%, #1d3e34 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        .game-container {
            background: #e8d5b5;
            padding: 2rem 2rem 1.8rem;
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.5);
            border: 6px solid #b78c5a;
        }
        h1 {
            text-align: center;
            margin: 0 0 0.5rem 0;
            color: #3e2c1a;
            text-shadow: 2px 2px 0 #c9a87c, 4px 4px 0 #9b6e3b;
            font-size: 2.5rem;
        }
        canvas {
            display: block;
            margin: 0 auto;
            width: 600px;
            height: 600px;
            border-radius: 24px;
            box-shadow: inset 0 0 0 2px #b38b54, 0 20px 30px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            background-color: #ebc28e;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.2rem;
            padding: 0 10px;
        }
        .status-box {
            background: #493624;
            color: #f3deba;
            font-size: 1.7rem;
            font-weight: bold;
            padding: 0.5rem 2rem;
            border-radius: 50px;
            box-shadow: inset 0 -3px 0 #1f130c, 0 8px 0 #2b1c12;
            min-width: 240px;
            text-align: center;
        }
        .status-box.draw {
            background: #3a4a4b;
            box-shadow: inset 0 -3px 0 #1d2b2b, 0 8px 0 #1d2f2c;
        }
        button {
            background: #d6ae7a;
            border: none;
            font-size: 1.7rem;
            font-weight: bold;
            padding: 0.6rem 2.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: inset 0 -6px 0 #8b6137, 0 8px 0 #6a4c2b;
            transition: 0.08s linear;
            border: 1px solid #ffd89c;
        }
        button:active {
            transform: translateY(6px);
            box-shadow: inset 0 -2px 0 #8b6137, 0 2px 0 #6a4c2b;
        }
        footer {
            text-align: center;
            color: #cbb386;
            margin-top: 0.8rem;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>⚫ 在线五子棋 ⚪</h1>
    <canvas id="gobanCanvas" width="600" height="600"></canvas>
    <div class="info-panel">
        <div class="status-box" id="gameStatus">等待玩家...</div>
        <button id="resetGame">↺ 重来</button>
    </div>
    <footer>双人在线 · 无需信用卡</footer>
</div>

<script>
    (function() {
        const BOARD_SIZE = 15;
        const MARGIN = 30;
        const canvas = document.getElementById('gobanCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('gameStatus');
        const resetBtn = document.getElementById('resetGame');
        const cellSize = (canvas.width - 2 * MARGIN) / (BOARD_SIZE - 1);

        // 本地棋盘状态
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let myRole = null;          // 'black' 或 'white'
        let currentTurn = 'black';
        let winner = null;
        let gameId = null;           // 用于区分不同的对局

        // ---------- 初始化 Apinator 连接 ----------
        // 注意：这里的 key 需要替换为您在 Apinator 控制台获取的实际值
        const apinator = new ApinatorClient({
            appId: '3f64cee1-e82d-4b21-902f-ced81336f9d3',      // 替换为您的 App ID
            key: 'app_230cf0300ad3be60eeb54fd03fb69bee5d67e10f',           // 替换为您的 Key
            secret: 'a88536b540a94d53d7194ca68cc688252d2631db8bbf337a119d222a216b4309'      // 替换为您的 Secret
        });

        // 生成一个简单的游戏ID（实际应用中可以让创建者生成，另一个输入）
        // 为了简化，我们使用固定的房间号，两人输入相同房间号即可匹配
        let roomId = prompt('请输入房间号（两人输入相同房间号即可匹配）', 'room1');
        if (!roomId) roomId = 'room1';

        // 连接到频道
        const channel = apinator.subscribe(`game-${roomId}`);

        // 监听对方落子
        channel.bind('move', function(data) {
            // 如果是自己发的消息，忽略
            if (data.player === myRole) return;
            
            // 更新棋盘
            board = data.board;
            currentTurn = data.currentTurn;
            winner = data.winner;
            renderBoard();
            updateStatus();
        });

        // 监听玩家加入
        channel.bind('join', function(data) {
            if (data.player === 'black') {
                myRole = 'black';
                statusDiv.textContent = '你是黑棋，等待白棋...';
            } else if (data.player === 'white') {
                myRole = 'white';
                statusDiv.textContent = '你是白棋，游戏开始！';
            }
        });

        // 加入游戏
        apinator.trigger(`game-${roomId}`, 'join', { player: 'black' });  // 简化版，实际需要判断谁先加入

        // ---------- 渲染函数 ----------
        function renderBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ebc28e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 网格
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#5f3e25';
            for (let i = 0; i < BOARD_SIZE; i++) {
                const x = MARGIN + i * cellSize;
                ctx.beginPath(); ctx.moveTo(x, MARGIN); ctx.lineTo(x, canvas.height - MARGIN); ctx.stroke();
            }
            for (let i = 0; i < BOARD_SIZE; i++) {
                const y = MARGIN + i * cellSize;
                ctx.beginPath(); ctx.moveTo(MARGIN, y); ctx.lineTo(canvas.width - MARGIN, y); ctx.stroke();
            }

            // 星位
            const starPositions = [[3,3],[11,3],[7,7],[3,11],[11,11]];
            starPositions.forEach(([col, row]) => {
                const x = MARGIN + col * cellSize;
                const y = MARGIN + row * cellSize;
                ctx.beginPath(); ctx.arc(x, y, cellSize*0.15, 0, 2*Math.PI); ctx.fillStyle = '#4a3320'; ctx.fill();
                ctx.beginPath(); ctx.arc(x, y, cellSize*0.08, 0, 2*Math.PI); ctx.fillStyle = '#e3b27c'; ctx.fill();
            });

            // 棋子
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === 0) continue;
                    drawPiece(MARGIN + c * cellSize, MARGIN + r * cellSize, board[r][c]);
                }
            }
        }

        function drawPiece(x, y, colorVal) {
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            const radius = cellSize * 0.4;

            if (colorVal === 1) {
                const grad = ctx.createRadialGradient(x-3, y-3, radius*0.2, x, y, radius*1.5);
                grad.addColorStop(0, '#aaa'); grad.addColorStop(0.4, '#444'); grad.addColorStop(1, '#111');
                ctx.fillStyle = grad;
            } else {
                const grad = ctx.createRadialGradient(x-4, y-4, radius*0.25, x, y, radius*1.4);
                grad.addColorStop(0, '#fffefa'); grad.addColorStop(0.5, '#ddd'); grad.addColorStop(1, '#adadad');
                ctx.fillStyle = grad;
            }

            ctx.beginPath(); ctx.arc(x, y, radius, 0, 2*Math.PI); ctx.fill();
            ctx.shadowBlur = 4;
            ctx.strokeStyle = colorVal === 1 ? '#222' : '#666';
            ctx.lineWidth = 1.5; ctx.stroke();
            ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
        }

        function updateStatus() {
            if (!myRole) {
                statusDiv.textContent = '⏳ 等待分配角色...';
                return;
            }
            if (winner === 'black') {
                statusDiv.textContent = '⚑ 黑方胜利';
                statusDiv.classList.add('draw');
            } else if (winner === 'white') {
                statusDiv.textContent = '⚐ 白方胜利';
                statusDiv.classList.add('draw');
            } else if (winner === 'draw') {
                statusDiv.textContent = '🤝 平局';
                statusDiv.classList.add('draw');
            } else {
                const isMyTurn = (myRole === currentTurn);
                statusDiv.textContent = isMyTurn ? 
                    (myRole === 'black' ? '⚫ 你的回合' : '⚪ 你的回合') : 
                    (currentTurn === 'black' ? '⚫ 对手回合' : '⚪ 对手回合');
                statusDiv.classList.remove('draw');
            }
        }

        function checkWin(row, col, color) {
            const dirs = [[1,0],[0,1],[1,1],[1,-1]];
            for (let [dx, dy] of dirs) {
                let count = 1;
                for (let step = 1; step < 5; step++) {
                    const nr = row + dx*step, nc = col + dy*step;
                    if (nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE||board[nr][nc]!==color) break;
                    count++;
                }
                for (let step = 1; step < 5; step++) {
                    const nr = row - dx*step, nc = col - dy*step;
                    if (nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE||board[nr][nc]!==color) break;
                    count++;
                }
                if (count >= 5) return true;
            }
            return false;
        }

        function isBoardFull() {
            for (let r=0; r<BOARD_SIZE; r++) {
                for (let c=0; c<BOARD_SIZE; c++) {
                    if (board[r][c]===0) return false;
                }
            }
            return true;
        }

        function handleCanvasClick(e) {
            if (!myRole) { alert('等待角色分配...'); return; }
            if (winner) return;
            if (myRole !== currentTurn) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;

            let col = Math.round((mouseX - MARGIN) / cellSize);
            let row = Math.round((mouseY - MARGIN) / cellSize);
            if (col < 0 || col >= BOARD_SIZE || row < 0 || row >= BOARD_SIZE) return;

            const crossX = MARGIN + col * cellSize;
            const crossY = MARGIN + row * cellSize;
            if (Math.hypot(mouseX - crossX, mouseY - crossY) > cellSize * 0.4) return;

            // 更新本地棋盘
            const currentColor = (myRole === 'black') ? 1 : 2;
            board[row][col] = currentColor;

            // 检查胜负
            let newWinner = winner;
            if (checkWin(row, col, currentColor)) {
                newWinner = myRole;
            } else if (isBoardFull()) {
                newWinner = 'draw';
            }

            // 切换回合
            let nextTurn = currentTurn;
            if (!newWinner) {
                nextTurn = (currentTurn === 'black') ? 'white' : 'black';
            }

            // 发送落子消息给对方
            apinator.trigger(`game-${roomId}`, 'move', {
                player: myRole,
                board: board,
                currentTurn: nextTurn,
                winner: newWinner
            });

            // 更新本地状态
            currentTurn = nextTurn;
            winner = newWinner;
            
            renderBoard();
            updateStatus();
        }

        resetBtn.addEventListener('click', () => {
            // 重置棋盘
            board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            currentTurn = 'black';
            winner = null;
            
            // 发送重置消息给对方
            apinator.trigger(`game-${roomId}`, 'move', {
                player: myRole,
                board: board,
                currentTurn: currentTurn,
                winner: null
            });
            
            renderBoard();
            updateStatus();
        });

        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleCanvasClick({ clientX: touch.clientX, clientY: touch.clientY });
        }, { passive: false });

        renderBoard();
    })();
</script>
</body>
</html>
